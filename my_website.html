<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أفلامك | منصة الأفلام والمسلسلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #e50914; --bg: #050505; --card: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        .logo { font-size: 28px; font-weight: 900; color: var(--main); cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card h3 { padding: 10px; margin: 0; text-align: center; }
        .eps-list { max-height: 200px; overflow-y: auto; padding: 10px; }
        .ep { display: block; color: #aaa; padding: 8px; border-bottom: 1px solid #222; text-decoration: none; }
        .ep:hover { color: var(--main); }
        #admin { display: none; background: #1a1a1a; padding: 30px; margin: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        .btn { background: var(--main); color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">أفلامك</div>
    <button onclick="checkAdmin()" style="background:none; border:none; color:#555; cursor:pointer;">دخول المدير</button>
</header>

<div id="admin">
    <h2>إضافة حلقة (لوحة المدير)</h2>
    <input type="text" id="mName" placeholder="اسم المسلسل (مثال: قيامة عثمان)">
    <input type="number" id="eNum" placeholder="رقم الحلقة">
    <input type="url" id="eLink" placeholder="رابط الحلقة">
    <input type="url" id="ePoster" placeholder="رابط صورة الغلاف">
    <button class="btn" onclick="save()">نشر الحلقة</button>
</div>

<div class="grid" id="main"></div>

<script>
    const DB = "https://aflamk-fadf7-default-rtdb.firebaseio.com/series.json";

    // إضافة بيانات
    async function save() {
        const data = { 
            name: document.getElementById('mName').value,
            ep: parseInt(document.getElementById('eNum').value),
            link: document.getElementById('eLink').value,
            poster: document.getElementById('ePoster').value
        };
        await fetch(DB, { method: 'POST', body: JSON.stringify(data) });
        alert("تمت الإضافة!"); location.reload();
    }

    // جلب وعرض البيانات
    async function load() {
        const res = await fetch(DB);
        const data = await res.json();
        const main = document.getElementById('main');
        let groups = {};
        for(let id in data) {
            if(!groups[data[id].name]) groups[data[id].name] = {poster: data[id].poster, eps: []};
            groups[data[id].name].eps.push({n: data[id].ep, l: data[id].link});
        }
        for(let name in groups) {
            groups[name].eps.sort((a, b) => a.n - b.n);
            main.innerHTML += 
                <div class="card">
                    <img src="${groups[name].poster}">
                    <h3>${name}</h3>
                    <div class="eps-list">
                        ${groups[name].eps.map(e => <a href="${e.l}" target="_blank" class="ep">الحلقة ${e.n}</a>).join('')}
                    </div>
                </div>;
        }
    }

    function checkAdmin() {
        if(prompt("كلمة السر:") === "Ammar800") document.getElementById('admin').style.display = 'block';
    }

    load();
</script>

<script src="https://pl28888535.effectivegatecpm.com/80/28/95/8028959520c9c67dc4f52aea132e267c.js"></script>

</body>
</html>
