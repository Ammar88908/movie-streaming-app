<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Admin Dashboard</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .container { width: 90%; max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }\n        h1 { text-align: center; }\n        form { display: flex; flex-direction: column; }\n        label { margin-bottom: 5px; }\n        input[type='text'], input[type='url'], input[type='password'] { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }\n        button { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Admin Dashboard</h1>\n        <form id="addMovieForm">\n            <label for="movieUrl">Movie URL:</label>\n            <input type="url" id="movieUrl" name="movieUrl" required>\n\n            <label for="adminPassword">Password:</label>\n            <input type="password" id="adminPassword" name="adminPassword" required>\n\n            <button type="submit">Add Movie</button>\n        </form>\n    </div>\n<script>\n    document.getElementById('addMovieForm').onsubmit = function(event) {\n        event.preventDefault();\n        var movieUrl = document.getElementById('movieUrl').value;\n        var password = document.getElementById('adminPassword').value;\n\n        // Example password check (hardcoded for demonstration)\n        if (password === 'your_password_here') {\n            // Logic to add the movie URL goes here\n            alert('Movie added: ' + movieUrl);\n        } else {\n            alert('Invalid password.');\n        }\n    };\n</script>\n</body>\n</html>
