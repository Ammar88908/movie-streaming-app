<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            direction: rtl;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        form {
            background: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        input[type="password"], input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .movie-card {
            background: #ffffff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<header>
    <h1>لوحة إدارة الأفلام</h1>
</header>

<div class="container">
    <form id="loginForm" onsubmit="return validateForm()">
        <label for="password">كلمة المرور:</label>
        <input type="password" id="password" name="password" required>
        <input type="submit" value="تسجيل الدخول">
    </form>

    <div id="movieGrid" class="movie-grid" style="display:none;">
        <div class="movie-card">فيلم 1</div>
        <div class="movie-card">فيلم 2</div>
        <div class="movie-card">فيلم 3</div>
        <div class="movie-card">فيلم 4</div>
        <div class="movie-card">فيلم 5</div>
    </div>
</div>

<script>
    function validateForm() {
        const password = document.getElementById('password').value;
        // Simple password check (this should be securely managed on the server-side)
        if(password === 'your_secure_password') {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('movieGrid').style.display = 'grid';
            return false; // Prevent actual form submission
        } else {
            alert('كلمة المرور غير صحيحة');
            return false; // Prevent form submission
        }
    }
</script>

</body>
</html>
