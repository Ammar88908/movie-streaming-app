<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افلامك | منصة الأفلام والمسلسلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header -->
<header class="site-header">
    <div class="header-inner">
        <div class="logo" onclick="window.location.reload()">🎬 افلامك</div>
        <div class="header-actions">
            <a href="admin.html" class="admin-btn">لوحة الإدارة</a>
        </div>
    </div>
</header>

<!-- Search Bar -->
<section class="search-section">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن فيلم أو مسلسل..." oninput="handleSearch()">
        <span class="search-icon">🔍</span>
    </div>
</section>

<!-- Categories -->
<section class="categories-section">
    <div class="categories-wrapper">
        <button class="cat-btn active" data-cat="جميع" onclick="setCategory(this)">جميع</button>
        <button class="cat-btn" data-cat="أفلام" onclick="setCategory(this)">🎬 أفلام</button>
        <button class="cat-btn" data-cat="مسلسلات" onclick="setCategory(this)">📺 مسلسلات</button>
        <button class="cat-btn" data-cat="أنمي" onclick="setCategory(this)">🎌 أنمي</button>
        <button class="cat-btn" data-cat="وثائقي" onclick="setCategory(this)">🎥 وثائقي</button>
    </div>
</section>

<!-- Movies Grid -->
<main class="main-content">
    <div class="section-header">
        <h2 id="sectionTitle">جميع المحتويات</h2>
        <span id="movieCount" class="movie-count"></span>
    </div>
    <div id="moviesGrid" class="movies-grid">
        <!-- Movies will be loaded here -->
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-icon">🎬</div>
        <p>لا توجد نتائج</p>
        <small>جرب البحث بكلمات مختلفة أو اختر تصنيفاً آخر</small>
    </div>
    <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>
</main>

<!-- Video Player Modal -->
<div id="playerModal" class="modal" onclick="closeModalOnBackdrop(event)">
    <div class="modal-content">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <div id="playerContainer" class="player-container"></div>
        <div class="movie-details" id="movieDetails"></div>
    </div>
</div>

<!-- Footer -->
<footer class="site-footer">
    <p>© 2024 افلامك | منصة الأفلام والمسلسلات</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
